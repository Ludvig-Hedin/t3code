name: BirdCode

options:
  bundleIdPrefix: com.ludvighedin

settings:
  base:
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    SWIFT_VERSION: 5.10
    TARGETED_DEVICE_FAMILY: 1

targets:
  BirdCode:
    type: application
    platform: iOS
    sources:
      - path: Sources/BirdCode
    resources:
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ludvighedin.birdcodemobile
        INFOPLIST_KEY_CFBundleDisplayName: Bird Code
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_NSCameraUsageDescription: Scan Bird Code pairing QR codes from your desktop or other devices.
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
