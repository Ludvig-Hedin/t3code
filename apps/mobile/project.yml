name: BirdCode

options:
  bundleIdPrefix: com.ludvighedin

settings:
  base:
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    SWIFT_VERSION: 5.10
    TARGETED_DEVICE_FAMILY: 1

targets:
  BirdCode:
    type: application
    platform: iOS
    sources:
      - path: Sources/BirdCode
      - path: Resources
        type: syncedFolder
        explicitFolders:
          - Assets.xcassets
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Bird Code
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSApplicationCategoryType: public.app-category.developer-tools
        LSRequiresIPhoneOS: true
        UIRequiresFullScreen: true
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations: {}
        NSCameraUsageDescription: Scan Bird Code pairing QR codes from your desktop or other devices.
        NSLocalNetworkUsageDescription: Bird Code needs local network access to reach your desktop session for pairing and syncing.
        # Bonjour services must be declared for iOS to grant Local Network access
        # to the HTTP pairing request. Without at least one entry, the system
        # never prompts the user and URLSession to a LAN IP fails silently with
        # cannotConnectToHost on iOS 17+.
        NSBonjourServices:
          - _http._tcp
          - _birdcode._tcp
        # App Transport Security: desktop serves the pairing API and the full web
        # app over plain HTTP on a private IP. Without these ATS settings iOS
        # blocks both the URLSession pair POST and the WKWebView HTTP load.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoadsInWebContent: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ludvighedin.birdcodemobile
        GENERATE_INFOPLIST_FILE: NO
